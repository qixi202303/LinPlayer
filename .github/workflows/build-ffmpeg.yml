name: Build FFmpeg Extension

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android/exoplayer-ffmpeg/**'
      - '.github/workflows/build-ffmpeg.yml'
  workflow_dispatch:
  schedule:
    # 每周一凌晨编译一次（保持依赖最新）
    - cron: '0 0 * * 1'

env:
  EXOPLAYER_VERSION: 1.3.1
  FFMPEG_VERSION: n6.0
  NDK_VERSION: r25c

jobs:
  build-ffmpeg:
    name: Build FFmpeg Extension AAR
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        # 只编译主流真机架构（arm64-v8a 覆盖 95%+ 设备）
        # 跳过 x86_64 以避免 nasm/yasm 依赖和 NDK 工具链问题
        arch: [arm64-v8a, armeabi-v7a]
    
    steps:
      - name: Checkout LinPlayer code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      # 缓存 FFmpeg 源码
      - name: Cache FFmpeg source
        uses: actions/cache@v4
        id: ffmpeg-cache
        with:
          path: ~/ffmpeg-src
          key: ffmpeg-${{ env.FFMPEG_VERSION }}-${{ matrix.arch }}
      
      # 下载 Android NDK
      - name: Download Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /opt
          echo "NDK_PATH=/opt/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
      
      # 下载 ExoPlayer media3 源码
      - name: Download ExoPlayer source
        run: |
          git clone --depth 1 --branch ${{ env.EXOPLAYER_VERSION }} \
            https://github.com/androidx/media.git /tmp/media3
      
      # 下载 FFmpeg 源码（如果被缓存则跳过）
      - name: Download FFmpeg source
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/ffmpeg-src
          git clone --depth 1 --branch ${{ env.FFMPEG_VERSION }} \
            https://git.ffmpeg.org/ffmpeg.git ~/ffmpeg-src/ffmpeg
      
      # 复制 FFmpeg 到 ExoPlayer 目录
      - name: Setup FFmpeg in ExoPlayer
        run: |
          cp -r ~/ffmpeg-src/ffmpeg /tmp/media3/libraries/decoder_ffmpeg/src/main/jni/
      
      # 编译 FFmpeg（使用官方脚本风格）
      - name: Build FFmpeg for ${{ matrix.arch }}
        run: |
          FFMPEG_MODULE_PATH="/tmp/media3/libraries/decoder_ffmpeg/src/main"
          NDK_PATH="/opt/android-ndk-${NDK_VERSION}"
          HOST_PLATFORM="linux-x86_64"
          ANDROID_ABI="21"
          ENABLED_DECODERS=(pgssub dvbsub dvdsub ass ssa srt webvtt)
          JOBS=$(nproc)
          
          COMMON_OPTIONS="
              --target-os=android
              --enable-static
              --disable-shared
              --disable-doc
              --disable-programs
              --disable-everything
              --disable-avdevice
              --disable-avformat
              --disable-swscale
              --disable-postproc
              --disable-avfilter
              --disable-symver
              --enable-swresample
              --extra-ldexeflags=-pie
              --disable-v4l2-m2m
              --disable-vulkan
              --disable-asm
              "
          
          for decoder in "${ENABLED_DECODERS[@]}"; do
              COMMON_OPTIONS="${COMMON_OPTIONS} --enable-decoder=${decoder}"
          done
          
          TOOLCHAIN_PREFIX="${NDK_PATH}/toolchains/llvm/prebuilt/${HOST_PLATFORM}/bin"
          
          cd "${FFMPEG_MODULE_PATH}/jni/ffmpeg"
          
          case ${{ matrix.arch }} in
            arm64-v8a)
              ./configure \
                  --libdir=android-libs/arm64-v8a \
                  --arch=aarch64 \
                  --cpu=armv8-a \
                  --cross-prefix="${TOOLCHAIN_PREFIX}/aarch64-linux-android${ANDROID_ABI}-" \
                  --nm="${TOOLCHAIN_PREFIX}/llvm-nm" \
                  --ar="${TOOLCHAIN_PREFIX}/llvm-ar" \
                  --ranlib="${TOOLCHAIN_PREFIX}/llvm-ranlib" \
                  --strip="${TOOLCHAIN_PREFIX}/llvm-strip" \
                  ${COMMON_OPTIONS}
              make -j${JOBS}
              make install-libs
              ;;
            armeabi-v7a)
              ./configure \
                  --libdir=android-libs/armeabi-v7a \
                  --arch=arm \
                  --cpu=armv7-a \
                  --cross-prefix="${TOOLCHAIN_PREFIX}/armv7a-linux-androideabi${ANDROID_ABI}-" \
                  --nm="${TOOLCHAIN_PREFIX}/llvm-nm" \
                  --ar="${TOOLCHAIN_PREFIX}/llvm-ar" \
                  --ranlib="${TOOLCHAIN_PREFIX}/llvm-ranlib" \
                  --strip="${TOOLCHAIN_PREFIX}/llvm-strip" \
                  --extra-cflags="-march=armv7-a -mfloat-abi=softfp" \
                  --extra-ldflags="-Wl,--fix-cortex-a8" \
                  ${COMMON_OPTIONS}
              make -j${JOBS}
              make install-libs
              ;;
          esac
      
      # 编译 AAR
      - name: Build AAR
        run: |
          cd /tmp/media3
          ./gradlew :lib-decoder-ffmpeg:assembleRelease
      
      # 上传 AAR Artifact
      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-extension-${{ matrix.arch }}
          path: /tmp/media3/libraries/decoder_ffmpeg/build/outputs/aar/decoder_ffmpeg-release.aar
          retention-days: 90
  
  # 合并所有架构的 AAR
  merge-aar:
    name: Merge AAR Artifacts
    needs: build-ffmpeg
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: ffmpeg-extension-*
      
      - name: List artifacts
        run: |
          echo "Available artifacts:"
          find ./artifacts -name "*.aar"
      
      # 合并 AAR（使用 ar 命令解压并重新打包）
      - name: Merge AAR files
        run: |
          mkdir -p ./merged
          cd ./merged
          
          # 使用第一个 AAR 作为基础
          cp ../artifacts/ffmpeg-extension-arm64-v8a/decoder_ffmpeg-release.aar ./ffmpeg-extension.aar
          unzip -q ./ffmpeg-extension.aar -d ./aar-content
          
          # 合并其他架构的 .so 文件
          for arch_dir in ../artifacts/ffmpeg-extension-*/; do
            arch=$(basename "$arch_dir" | sed 's/ffmpeg-extension-//')
            aar_file="${arch_dir}decoder_ffmpeg-release.aar"
            if [ -f "$aar_file" ]; then
              echo "Merging $arch..."
              unzip -q "$aar_file" -d ./temp-aar
              cp -r ./temp-aar/jni/* ./aar-content/jni/ 2>/dev/null || true
              rm -rf ./temp-aar
            fi
          done
          
          # 重新打包
          cd ./aar-content
          zip -r ../ffmpeg-extension-merged.aar .
      
      - name: Upload merged AAR
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-extension-all
          path: ./merged/ffmpeg-extension-merged.aar
          retention-days: 90
      
      # 可选：创建 Release 并上传 AAR
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ffmpeg-extension-${{ github.run_number }}
          name: FFmpeg Extension Build ${{ github.run_number }}
          body: |
            自动编译的 ExoPlayer FFmpeg 扩展
            
            - ExoPlayer 版本: ${{ env.EXOPLAYER_VERSION }}
            - FFmpeg 版本: ${{ env.FFMPEG_VERSION }}
            - 支持的架构: arm64-v8a, armeabi-v7a
            - 支持的字幕格式: PGS, SUP, DVB, DVD, ASS, SSA, SRT, WEBVTT
            
            使用方式：
            1. 下载 `ffmpeg-extension-all` artifact
            2. 解压后将 `.aar` 文件放入 `android/exoplayer-ffmpeg/libs/`
            3. 在 `android/app/build.gradle.kts` 中添加依赖
          files: ./merged/ffmpeg-extension-merged.aar
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
