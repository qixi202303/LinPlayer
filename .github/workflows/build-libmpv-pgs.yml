name: Build libmpv with PGS support

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 3'

env:
  BUILD_REPO: media-kit/libmpv-android-video-build
  RELEASE_TAG: v1.1.11

jobs:
  build-and-commit:
    name: Build and commit libmpv
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout LinPlayer
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Checkout libmpv-android-video-build
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BUILD_REPO }}
          path: libmpv-build
      
      - name: Check ffmpeg config for PGS
        run: |
          cd libmpv-build
          echo "=== Checking ffmpeg configuration ==="
          
          # Find ffmpeg config script
          FFMPEG_CONFIG=$(find . -name "*.sh" -exec grep -l "disable-everything" {} \; | head -1)
          if [ -n "$FFMPEG_CONFIG" ]; then
            echo "Found: $FFMPEG_CONFIG"
            echo "=== Current config (decoder section) ==="
            grep -n "enable-decoder\|disable-everything" "$FFMPEG_CONFIG" | head -20
            
            # Enable PGS decoders
            sed -i 's/--disable-everything/--disable-everything --enable-decoder=pgssub --enable-decoder=dvdsub --enable-decoder=dvbsub/' "$FFMPEG_CONFIG"
            echo "=== Modified config ==="
            grep -n "enable-decoder\|disable-everything" "$FFMPEG_CONFIG" | head -20
          fi
      
      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip ninja-build cmake pkg-config
          pip3 install meson
      
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          link-to-sdk: true
      
      - name: Build libmpv using buildscripts
        run: |
          cd libmpv-build
          
          # Check build script
          if [ -f "buildscripts/build.sh" ]; then
            echo "Found buildscripts/build.sh"
            ls -la buildscripts/
            
            # Run build (this may take 30-60 minutes)
            cd buildscripts
            bash build.sh 2>&1 | tee build.log
          else
            echo "Build script not found"
            find . -name "build.sh" | head -10
          fi
        continue-on-error: true
        timeout-minutes: 120
      
      - name: Find built JARs
        run: |
          echo "=== Searching for JARs ==="
          find libmpv-build -name "default-*.jar" -type f 2>/dev/null | while read jar; do
            echo "Found: $jar ($(stat -c%s "$jar") bytes)"
          done
          
          # If build didn't produce JARs, download from release
          if [ -z "$(find libmpv-build -name 'default-*.jar' -type f 2>/dev/null)" ]; then
            echo "No JARs built, downloading from release ${{ env.RELEASE_TAG }}..."
            mkdir -p libmpv-build/prebuilt
            cd libmpv-build/prebuilt
            
            for abi in arm64-v8a armeabi-v7a x86 x86_64; do
              jar_name="default-${abi}.jar"
              url="https://github.com/${{ env.BUILD_REPO }}/releases/download/${{ env.RELEASE_TAG }}/${jar_name}"
              echo "Downloading $jar_name..."
              wget -q "$url" -O "$jar_name" || echo "Failed to download $jar_name"
            done
            
            ls -la
          fi
      
      - name: Extract libmpv.so
        run: |
          mkdir -p built-libraries
          
          # Extract from built or downloaded JARs
          find libmpv-build -name "default-*.jar" -type f | while read jar; do
            abi=$(basename "$jar" .jar | sed 's/default-//')
            echo "Extracting $abi from $(basename $jar)..."
            mkdir -p "built-libraries/$abi"
            cd "built-libraries/$abi"
            jar xf "$jar"
            cd ../..
          done
          
          echo "=== Extracted libraries ==="
          find built-libraries -name "libmpv.so" -exec ls -lh {} \; 2>/dev/null || echo "No libmpv.so found"
      
      - name: Verify PGS and copy to jniLibs
        run: |
          mkdir -p android/app/src/main/jniLibs
          
          find built-libraries -name "libmpv.so" | while read lib; do
            abi=$(basename $(dirname "$lib"))
            mkdir -p "android/app/src/main/jniLibs/$abi"
            cp "$lib" "android/app/src/main/jniLibs/$abi/"
            
            # Verify PGS support
            if strings "$lib" | grep -q "pgssub"; then
              echo "✅ $abi: PGS decoder found"
            else
              echo "⚠️ $abi: PGS decoder not found"
            fi
          done
      
      - name: Commit if libraries found
        run: |
          echo "=== jniLibs contents ==="
          find android/app/src/main/jniLibs -name "*.so" -exec ls -lh {} \; 2>/dev/null || echo "No libraries"
          
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add android/app/src/main/jniLibs/
          
          if git diff --cached --quiet; then
            echo "No libraries to commit"
            exit 0
          fi
          
          git commit -m "chore: update libmpv with PGS support (from ${{ env.BUILD_REPO }} ${{ env.RELEASE_TAG }})"
          git push
          echo "✅ Libraries committed"
        continue-on-error: true
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: libmpv-build-output
          path: |
            built-libraries/**/libmpv.so
            libmpv-build/**/*.jar
            libmpv-build/**/build.log
          if-no-files-found: warn
          retention-days: 7