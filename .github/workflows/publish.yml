name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0, must match a Pre-release)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Promote Pre-release to Release
    runs-on: ubuntu-latest

    steps:
      - name: Download Pre-release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/assets
          gh release download "v${{ inputs.version }}-pre" \
            --dir /tmp/assets \
            --repo "${{ github.repository }}"

          echo "Downloaded assets:"
          ls -lah /tmp/assets/

      - name: Verify assets
        run: |
          set -euo pipefail

          echo "Verifying downloaded assets..."

          REQUIRED_FILES=(
            "/tmp/assets/app-arm64-v8a-release.apk"
            "/tmp/assets/app-armeabi-v7a-release.apk"
            "/tmp/assets/linplayer-tv.apk"
            "/tmp/assets/LinPlayer-iOS-v${{ inputs.version }}-unsigned.zip"
            "/tmp/assets/LinPlayer-tvOS-v${{ inputs.version }}-unsigned.zip"
            "/tmp/assets/LinPlayer-Windows-v${{ inputs.version }}.zip"
            "/tmp/assets/LinPlayer-Linux-v${{ inputs.version }}.tar.gz"
            "/tmp/assets/LinPlayer-macOS-v${{ inputs.version }}.zip"
          )

          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required asset: $file"
              exit 1
            fi
            echo "Found required asset: $(basename "$file")"
            ls -lh "$file"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          prerelease: false
          files: /tmp/assets/*
          generate_release_notes: true
          body: |
            ## LinPlayer v${{ inputs.version }}

            ### 下载

            **Android**
            - `app-arm64-v8a-release.apk`：推荐给大多数现代 Android 设备
            - `app-armeabi-v7a-release.apk`：兼容较旧的 32 位 Android 设备

            **Android TV**
            - `linplayer-tv.apk`：针对 Android TV 遥控器和焦点导航优化

            **iOS Mobile**
            - `LinPlayer-iOS-v${{ inputs.version }}-unsigned.zip`：真实 iOS Release 构建产物，当前为未签名 `.app` 打包

            **Apple TV (tvOS)**
            - `LinPlayer-tvOS-v${{ inputs.version }}-unsigned.zip`：原生 Swift/SwiftUI 构建，当前为未签名 `.app` 打包

            **Windows**
            - `LinPlayer-Windows-v${{ inputs.version }}.zip`：解压后运行其中的可执行文件

            **Linux**
            - `LinPlayer-Linux-v${{ inputs.version }}.tar.gz`：解压后运行目录中的可执行文件

            **macOS**
            - `LinPlayer-macOS-v${{ inputs.version }}.zip`：解压后打开 `.app`

            ### 安装说明

            **Android**
            1. 下载适合设备架构的 APK。
            2. 允许安装未知来源应用。
            3. 完成安装后启动应用。

            **Android TV**
            1. 下载 `linplayer-tv.apk`。
            2. 通过 ADB 或文件管理器安装到 Android TV。
            3. 使用遥控器方向键和确认键导航。

            **iOS Mobile**
            1. 下载 `LinPlayer-iOS-v${{ inputs.version }}-unsigned.zip`。
            2. 在 macOS 上解压得到 `.app`。
            3. 使用开发证书或分发证书重新签名后，再通过 Xcode、Apple Configurator 或其他分发流程安装。
            4. 如需直接产出可安装 `.ipa`，请在 CI 或本地 Xcode 中补充 Apple 签名与导出配置。

            **Apple TV (tvOS)**
            1. 下载 `LinPlayer-tvOS-v${{ inputs.version }}-unsigned.zip`。
            2. 在 macOS 上解压得到 `.app`。
            3. 使用 Apple 开发证书重新签名后，通过 Xcode 或 Apple Configurator 安装到 Apple TV。
            4. 也可通过 TestFlight 分发（需配置 App Store Connect）。

            **Windows**
            1. 下载 ZIP 文件。
            2. 解压到任意目录。
            3. 运行其中的应用程序。

            **Linux**
            1. 下载 `.tar.gz` 文件。
            2. 解压到任意目录。
            3. 为可执行文件添加执行权限后运行。

            **macOS**
            1. 下载 ZIP 文件。
            2. 解压得到 `.app`。
            3. 首次打开如遇到安全提示，请在系统设置中允许运行。

      - name: Delete Pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v${{ inputs.version }}-pre" \
            --yes \
            --repo "${{ github.repository }}" \
            --cleanup-tag
