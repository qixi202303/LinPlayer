name: Build Flutter

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.44.2'
  FLUTTER_CHANNEL: 'stable'

jobs:
  prepare:
    name: Prepare build metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            PUBSPEC_VER=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: *//' | cut -d'+' -f1)
            echo "version=${PUBSPEC_VER}-build${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Analyze code
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  # ============================================================
  # Android 构建
  # ============================================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: [prepare, analyze]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Fix plugin namespaces for AGP 8
        run: |
          # brightness_volume 1.0.3 doesn't have namespace (required by AGP 8.x)
          PLUGIN_DIR="/home/runner/.pub-cache/hosted/pub.dev/brightness_volume-1.0.3/android"
          if [ -f "$PLUGIN_DIR/build.gradle" ] && ! grep -q "namespace" "$PLUGIN_DIR/build.gradle"; then
            if [ -f "$PLUGIN_DIR/src/main/AndroidManifest.xml" ]; then
              PACKAGE=$(grep -o 'package="[^"]*"' "$PLUGIN_DIR/src/main/AndroidManifest.xml" | head -1 | cut -d'"' -f2)
              if [ -n "$PACKAGE" ]; then
                echo "Adding namespace '$PACKAGE' to brightness_volume"
                sed -i "/^android {/a\\    namespace '$PACKAGE'" "$PLUGIN_DIR/build.gradle"
                echo "Patched build.gradle:"
                cat "$PLUGIN_DIR/build.gradle"
              fi
            fi
          fi

      - name: Fix plugin compileSdk for androidx
        run: |
          # Many Flutter plugins use low compileSdk, but androidx dependencies require 36+
          for dir in /home/runner/.pub-cache/hosted/pub.dev/*/android; do
            if [ -f "$dir/build.gradle" ]; then
              sed -i -E "s/compileSdkVersion [0-9]+/compileSdkVersion 36/g" "$dir/build.gradle"
              sed -i -E "s/compileSdk = [0-9]+/compileSdk = 36/g" "$dir/build.gradle"
              if [ -f "$dir/build.gradle.kts" ]; then
                sed -i -E "s/compileSdkVersion = [0-9]+/compileSdkVersion = 36/g" "$dir/build.gradle.kts"
                sed -i -E "s/compileSdk = [0-9]+/compileSdk = 36/g" "$dir/build.gradle.kts"
              fi
            fi
            if [ -f "$dir/build.gradle.kts" ]; then
              sed -i -E "s/compileSdkVersion = [0-9]+/compileSdkVersion = 36/g" "$dir/build.gradle.kts"
              sed -i -E "s/compileSdk = [0-9]+/compileSdk = 36/g" "$dir/build.gradle.kts"
            fi
          done

      - name: Build Release APK (split per ABI)
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" 2>/dev/null || true

          CLEAN_ID=$(printf '%s' "$DANDANPLAY_APP_ID" | tr -d '\r\n')
          CLEAN_SECRET=$(printf '%s' "$DANDANPLAY_APP_SECRET" | tr -d '\r\n')

          flutter build apk --release --split-per-abi \
            --flavor mobile \
            --target-platform android-arm,android-arm64 \
            --dart-define=DANDANPLAY_APP_ID="$CLEAN_ID" \
            --dart-define=DANDANPLAY_APP_SECRET="$CLEAN_SECRET"

          APK_DIR="build/app/outputs/flutter-apk"
          ARM64_SOURCE=$(find "$APK_DIR" -maxdepth 1 -type f -name '*arm64-v8a*release.apk' | head -n 1)
          ARMEABI_SOURCE=$(find "$APK_DIR" -maxdepth 1 -type f -name '*armeabi-v7a*release.apk' | head -n 1)

          if [ -z "$ARM64_SOURCE" ] || [ -z "$ARMEABI_SOURCE" ]; then
            echo "Expected mobile split APKs not found in $APK_DIR"
            ls -lah "$APK_DIR" || true
            exit 1
          fi

          cp "$ARM64_SOURCE" "$APK_DIR/app-arm64-v8a-release.apk"
          cp "$ARMEABI_SOURCE" "$APK_DIR/app-armeabi-v7a-release.apk"

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: release-android-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: release-android-armeabi-v7a
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-android
          path: build/
          retention-days: 3

  # ============================================================
  # Android TV 构建
  # ============================================================
  build-android-tv:
    name: Build Android TV APK
    runs-on: ubuntu-latest
    needs: [prepare, analyze]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Fix plugin namespaces for AGP 8
        run: |
          # brightness_volume 1.0.3 doesn't have namespace (required by AGP 8.x)
          PLUGIN_DIR="/home/runner/.pub-cache/hosted/pub.dev/brightness_volume-1.0.3/android"
          if [ -f "$PLUGIN_DIR/build.gradle" ] && ! grep -q "namespace" "$PLUGIN_DIR/build.gradle"; then
            if [ -f "$PLUGIN_DIR/src/main/AndroidManifest.xml" ]; then
              PACKAGE=$(grep -o 'package="[^"]*"' "$PLUGIN_DIR/src/main/AndroidManifest.xml" | head -1 | cut -d'"' -f2)
              if [ -n "$PACKAGE" ]; then
                echo "Adding namespace '$PACKAGE' to brightness_volume"
                sed -i "/^android {/a\\    namespace '$PACKAGE'" "$PLUGIN_DIR/build.gradle"
                echo "Patched build.gradle:"
                cat "$PLUGIN_DIR/build.gradle"
              fi
            fi
          fi

      - name: Fix plugin compileSdk for androidx
        run: |
          # Many Flutter plugins use low compileSdk, but androidx dependencies require 36+
          for dir in /home/runner/.pub-cache/hosted/pub.dev/*/android; do
            if [ -f "$dir/build.gradle" ]; then
              sed -i -E "s/compileSdkVersion [0-9]+/compileSdkVersion 36/g" "$dir/build.gradle"
              sed -i -E "s/compileSdk = [0-9]+/compileSdk = 36/g" "$dir/build.gradle"
              if [ -f "$dir/build.gradle.kts" ]; then
                sed -i -E "s/compileSdkVersion = [0-9]+/compileSdkVersion = 36/g" "$dir/build.gradle.kts"
                sed -i -E "s/compileSdk = [0-9]+/compileSdk = 36/g" "$dir/build.gradle.kts"
              fi
            fi
            if [ -f "$dir/build.gradle.kts" ]; then
              sed -i -E "s/compileSdkVersion = [0-9]+/compileSdkVersion = 36/g" "$dir/build.gradle.kts"
              sed -i -E "s/compileSdk = [0-9]+/compileSdk = 36/g" "$dir/build.gradle.kts"
            fi
          done

      - name: Build Android TV Release APK
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" 2>/dev/null || true

          CLEAN_ID=$(printf '%s' "$DANDANPLAY_APP_ID" | tr -d '\r\n')
          CLEAN_SECRET=$(printf '%s' "$DANDANPLAY_APP_SECRET" | tr -d '\r\n')

          # Build the dedicated TV variant and keep a stable artifact name for publishing.
          flutter build apk --release \
            --flavor tv \
            --target-platform android-arm,android-arm64 \
            --dart-define=FLAVOR=tv \
            --dart-define=DANDANPLAY_APP_ID="$CLEAN_ID" \
            --dart-define=DANDANPLAY_APP_SECRET="$CLEAN_SECRET"

          TV_APK_DIR="build/app/outputs/flutter-apk"
          TV_APK_SOURCE=$(find "$TV_APK_DIR" -maxdepth 1 -type f -name '*tv*release.apk' | head -n 1)
          TV_APK_TARGET="$TV_APK_DIR/linplayer-tv.apk"

          if [ -z "$TV_APK_SOURCE" ] || [ ! -f "$TV_APK_SOURCE" ]; then
            echo "Expected TV APK not found in $TV_APK_DIR"
            ls -lah "$TV_APK_DIR" || true
            exit 1
          fi

          cp "$TV_APK_SOURCE" "$TV_APK_TARGET"

      - name: Upload Android TV APK
        uses: actions/upload-artifact@v4
        with:
          name: release-android-tv
          path: build/app/outputs/flutter-apk/linplayer-tv.apk
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-android-tv
          path: build/
          retention-days: 3

  # ============================================================
  # iOS Mobile 构建
  # ============================================================
  build-ios:
    name: Build iOS Mobile
    runs-on: macos-latest
    needs: [prepare, analyze]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Enable iOS
        run: flutter config --enable-ios

      - name: Build iOS Release (unsigned)
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: |
          CLEAN_ID=$(printf '%s' "$DANDANPLAY_APP_ID" | tr -d '\r\n')
          CLEAN_SECRET=$(printf '%s' "$DANDANPLAY_APP_SECRET" | tr -d '\r\n')

          flutter build ios --release --no-codesign \
            --dart-define=DANDANPLAY_APP_ID="$CLEAN_ID" \
            --dart-define=DANDANPLAY_APP_SECRET="$CLEAN_SECRET"

      - name: Package iOS app bundle
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          APP_PATH=$(find build/ios/iphoneos -maxdepth 1 -type d -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No iOS app bundle found in build output"
            exit 1
          fi

          OUTPUT_NAME="LinPlayer-iOS-v$VERSION-unsigned"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$OUTPUT_NAME.zip"

          echo "Created: $OUTPUT_NAME.zip"
          ls -la build/ios/iphoneos

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ios
          path: LinPlayer-iOS-*.zip
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-ios
          path: build/
          retention-days: 3

  # ============================================================
  # Apple TV (tvOS) 构建 — 原生 Swift/SwiftUI，不依赖 Flutter
  # ============================================================
  build-tvos:
    name: Build Apple TV (tvOS)
    runs-on: macos-latest
    needs: [prepare]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # 使用最新可用的 Xcode
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode found"
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH"
          echo "Using Xcode: $(xcodebuild -version)"

      - name: Resolve Swift packages
        run: |
          cd apple_tv
          xcodebuild -resolvePackageDependencies \
            -project LinPlayerTV.xcodeproj \
            -scheme LinPlayerTV \
            -clonedSourcePackagesDirPath ../build/tvos-spm \
            2>&1 || true

      - name: Build tvOS Release (unsigned)
        run: |
          cd apple_tv
          xcodebuild build \
            -project LinPlayerTV.xcodeproj \
            -scheme LinPlayerTV \
            -sdk appletvos \
            -configuration Release \
            -derivedDataPath ../build/tvos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Package tvOS app bundle
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          APP_PATH=$(find build/tvos/Build/Products/Release-appletvos -maxdepth 1 -type d -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No tvOS app bundle found in build output"
            ls -laR build/tvos/Build/Products/ || true
            exit 1
          fi

          OUTPUT_NAME="LinPlayer-tvOS-v$VERSION-unsigned"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$OUTPUT_NAME.zip"

          echo "Created: $OUTPUT_NAME.zip"
          ls -lh "$OUTPUT_NAME.zip"

      - name: Upload tvOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tvos
          path: LinPlayer-tvOS-*.zip
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-tvos
          path: build/tvos/
          retention-days: 3

  # ============================================================
  # Windows 桌面端构建
  # ============================================================
  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    needs: [prepare, analyze]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows Release
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
          LINPLAYER_SKIP_LIBMPV_UPGRADE: 1
        shell: pwsh
        run: |
          $cleanId = "$env:DANDANPLAY_APP_ID" -replace "[`r`n]", ""
          $cleanSecret = "$env:DANDANPLAY_APP_SECRET" -replace "[`r`n]", ""

          flutter build windows --release `
            --dart-define=DANDANPLAY_APP_ID="$cleanId" `
            --dart-define=DANDANPLAY_APP_SECRET="$cleanSecret"

      - name: Upgrade libmpv-2.dll for PGS/SUP
        shell: pwsh
        run: |
          $outputDir = "build/windows/x64/runner/Release"
          & "$env:GITHUB_WORKSPACE/windows/scripts/upgrade_libmpv_for_pgs.ps1" -BuildOutput $outputDir

          $orig = Join-Path $outputDir "libmpv-2.dll.orig"
          if (-not (Test-Path -LiteralPath $orig)) {
            throw "libmpv-2.dll 未成功替换，PGS/SUP 可能无法显示"
          }

          $target = Join-Path $outputDir "libmpv-2.dll"
          $targetInfo = Get-Item -LiteralPath $target
          $origInfo = Get-Item -LiteralPath $orig
          if ($targetInfo.Length -le $origInfo.Length) {
            throw "libmpv-2.dll 替换后大小未增长，可能仍缺少 PGS 解码器"
          }

          Write-Host "libmpv-2.dll 已替换为完整版，目标大小: $($targetInfo.Length) bytes"

      - name: Package Windows Build
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $sourceDir = "build\windows\x64\runner\Release"
          $outputName = "LinPlayer-Windows-v$version"

          Compress-Archive -Path "$sourceDir\*" -DestinationPath "$outputName.zip" -Force

          Write-Host "Package contents:"
          Get-ChildItem "$sourceDir"

          Write-Host "Created: $outputName.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: LinPlayer-Windows-*.zip
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-windows
          path: build/
          retention-days: 3

  # ============================================================
  # Linux 桌面端构建
  # ============================================================
  build-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest
    needs: [prepare, analyze]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          # media_kit_video links libmpv via pkg-config on Linux.
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev libepoxy-dev

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux Release
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: |
          CLEAN_ID=$(printf '%s' "$DANDANPLAY_APP_ID" | tr -d '\r\n')
          CLEAN_SECRET=$(printf '%s' "$DANDANPLAY_APP_SECRET" | tr -d '\r\n')

          flutter build linux --release \
            --dart-define=DANDANPLAY_APP_ID="$CLEAN_ID" \
            --dart-define=DANDANPLAY_APP_SECRET="$CLEAN_SECRET"

      - name: Package Linux Build
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          SOURCE_DIR="build/linux/x64/release/bundle"
          OUTPUT_DIR="LinPlayer-Linux-v$VERSION"

          test -d "$SOURCE_DIR"
          mkdir -p "$OUTPUT_DIR"
          cp -R "$SOURCE_DIR"/. "$OUTPUT_DIR"/
          tar -czf "$OUTPUT_DIR.tar.gz" "$OUTPUT_DIR"

          echo "Created: $OUTPUT_DIR.tar.gz"
          ls -la "$OUTPUT_DIR"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: LinPlayer-Linux-*.tar.gz
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-linux
          path: build/
          retention-days: 3

  # ============================================================
  # macOS 桌面端构建
  # ============================================================
  build-macos:
    name: Build macOS Desktop
    runs-on: macos-latest
    needs: [prepare, analyze]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS Release
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: |
          CLEAN_ID=$(printf '%s' "$DANDANPLAY_APP_ID" | tr -d '\r\n')
          CLEAN_SECRET=$(printf '%s' "$DANDANPLAY_APP_SECRET" | tr -d '\r\n')

          flutter build macos --release \
            --dart-define=DANDANPLAY_APP_ID="$CLEAN_ID" \
            --dart-define=DANDANPLAY_APP_SECRET="$CLEAN_SECRET"

      - name: Package macOS Build
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          APP_PATH=$(find build/macos/Build/Products/Release -maxdepth 1 -type d -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No macOS app bundle found in build output"
            exit 1
          fi

          OUTPUT_NAME="LinPlayer-macOS-v$VERSION"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$OUTPUT_NAME.zip"

          echo "Created: $OUTPUT_NAME.zip"
          ls -la build/macos/Build/Products/Release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: LinPlayer-macOS-*.zip
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-macos
          path: build/
          retention-days: 3

  # ============================================================
  # 创建预发布版本（聚合所有平台产物）
  # ============================================================
  create-prerelease:
    name: Create Pre-release
    needs: [prepare, build-android, build-android-tv, build-ios, build-tvos, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: ./artifacts/
          merge-multiple: true

      - name: List release artifacts
        run: ls -lah ./artifacts/

      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}-pre
          name: v${{ needs.prepare.outputs.version }} (Pre-release)
          prerelease: true
          files: ./artifacts/*
          generate_release_notes: true
