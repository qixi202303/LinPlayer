name: Build Flutter APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      include_ffmpeg:
        description: 'Include FFmpeg extension (for PGS/SUP subtitle support)'
        required: true
        default: true
        type: boolean

env:
  EXOPLAYER_VERSION: 1.3.1
  FFMPEG_VERSION: n6.0
  NDK_VERSION: r25c

jobs:
  # 预编译 FFmpeg 扩展（如果需要且缓存未命中）
  build-ffmpeg:
    name: Pre-build FFmpeg Extension
    runs-on: ubuntu-latest
    if: github.event.inputs.include_ffmpeg != 'false'
    
    outputs:
      cache-hit: ${{ steps.cache-aar.outputs.cache-hit }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 检查 AAR 是否已缓存
      - name: Check AAR cache
        uses: actions/cache@v4
        id: cache-aar
        with:
          path: android/exoplayer-ffmpeg/libs/ffmpeg-extension.aar
          key: ffmpeg-aar-${{ env.EXOPLAYER_VERSION }}-${{ env.FFMPEG_VERSION }}-${{ hashFiles('android/exoplayer-ffmpeg/**') }}
      
      # 如果缓存命中，直接跳过
      - name: Skip if cached
        if: steps.cache-aar.outputs.cache-hit == 'true'
        run: |
          echo "FFmpeg extension AAR found in cache, skipping build."
          ls -la android/exoplayer-ffmpeg/libs/
      
      # 如果没有缓存，下载并编译 FFmpeg
      - name: Setup build environment
        if: steps.cache-aar.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip git cmake ninja-build yasm
      
      - name: Download Android NDK
        if: steps.cache-aar.outputs.cache-hit != 'true'
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip -O /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d /opt
          echo "NDK_PATH=/opt/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
      
      - name: Setup NDK toolchain symlinks
        if: steps.cache-aar.outputs.cache-hit != 'true'
        run: |
          # NDK r25c 使用 llvm-xxx 工具，但 FFmpeg configure 脚本期望旧命名
          # 为所有架构创建符号链接
          TOOLCHAIN=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          for PREFIX in aarch64-linux-android21 arm-linux-androideabi21 x86_64-linux-android21 i686-linux-android21; do
            ln -sf $TOOLCHAIN/llvm-ar $TOOLCHAIN/${PREFIX}-ar 2>/dev/null || true
            ln -sf $TOOLCHAIN/llvm-nm $TOOLCHAIN/${PREFIX}-nm 2>/dev/null || true
            ln -sf $TOOLCHAIN/llvm-ranlib $TOOLCHAIN/${PREFIX}-ranlib 2>/dev/null || true
            ln -sf $TOOLCHAIN/llvm-strip $TOOLCHAIN/${PREFIX}-strip 2>/dev/null || true
          done
          
          echo "Toolchain symlinks created"
          ls -la $TOOLCHAIN/*-nm | head -5
      
      - name: Setup Java
        if: steps.cache-aar.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Download ExoPlayer and FFmpeg source
        if: steps.cache-aar.outputs.cache-hit != 'true'
        run: |
          # 下载 ExoPlayer
          git clone --depth 1 --branch ${{ env.EXOPLAYER_VERSION }} \
            https://github.com/androidx/media.git /tmp/media3
          
          # 下载 FFmpeg
          git clone --depth 1 --branch ${{ env.FFMPEG_VERSION }} \
            https://git.ffmpeg.org/ffmpeg.git /tmp/media3/libraries/decoder_ffmpeg/src/main/jni/ffmpeg
      
      - name: Build FFmpeg for all architectures
        if: steps.cache-aar.outputs.cache-hit != 'true'
        run: |
          FFMPEG_MODULE_PATH="/tmp/media3/libraries/decoder_ffmpeg/src/main"
          NDK_PATH="/opt/android-ndk-${NDK_VERSION}"
          HOST_PLATFORM="linux-x86_64"
          ANDROID_ABI="21"
          ENABLED_DECODERS=(pgssub dvbsub dvdsub ass ssa srt webvtt)
          JOBS=$(nproc)
          
          COMMON_OPTIONS="
              --target-os=android
              --enable-static
              --disable-shared
              --disable-doc
              --disable-programs
              --disable-everything
              --disable-avdevice
              --disable-avformat
              --disable-swscale
              --disable-postproc
              --disable-avfilter
              --disable-symver
              --enable-swresample
              --extra-ldexeflags=-pie
              --disable-v4l2-m2m
              --disable-vulkan
              --disable-asm
              "
          
          for decoder in "${ENABLED_DECODERS[@]}"; do
              COMMON_OPTIONS="${COMMON_OPTIONS} --enable-decoder=${decoder}"
          done
          
          TOOLCHAIN_PREFIX="${NDK_PATH}/toolchains/llvm/prebuilt/${HOST_PLATFORM}/bin"
          
          # 编译 arm64-v8a
          cd "${FFMPEG_MODULE_PATH}/jni/ffmpeg"
          ./configure \
              --libdir=android-libs/arm64-v8a \
              --arch=aarch64 \
              --cpu=armv8-a \
              --cross-prefix="${TOOLCHAIN_PREFIX}/aarch64-linux-android${ANDROID_ABI}-" \
              --nm="${TOOLCHAIN_PREFIX}/llvm-nm" \
              --ar="${TOOLCHAIN_PREFIX}/llvm-ar" \
              --ranlib="${TOOLCHAIN_PREFIX}/llvm-ranlib" \
              --strip="${TOOLCHAIN_PREFIX}/llvm-strip" \
              ${COMMON_OPTIONS}
           make -j${JOBS}
           
           # 手动复制静态库到 CMake 期望的路径
           mkdir -p android-libs/arm64-v8a
           cp libavutil/libavutil.a android-libs/arm64-v8a/
           cp libswresample/libswresample.a android-libs/arm64-v8a/
           cp libavcodec/libavcodec.a android-libs/arm64-v8a/
           
           make clean
           
           # 编译 armeabi-v7a
           ./configure \
               --libdir=android-libs/armeabi-v7a \
               --arch=arm \
               --cpu=armv7-a \
               --cross-prefix="${TOOLCHAIN_PREFIX}/armv7a-linux-androideabi${ANDROID_ABI}-" \
               --nm="${TOOLCHAIN_PREFIX}/llvm-nm" \
               --ar="${TOOLCHAIN_PREFIX}/llvm-ar" \
               --ranlib="${TOOLCHAIN_PREFIX}/llvm-ranlib" \
               --strip="${TOOLCHAIN_PREFIX}/llvm-strip" \
               --extra-cflags="-march=armv7-a -mfloat-abi=softfp" \
               --extra-ldflags="-Wl,--fix-cortex-a8" \
               ${COMMON_OPTIONS}
           make -j${JOBS}
           
           # 手动复制静态库到 CMake 期望的路径
           mkdir -p android-libs/armeabi-v7a
           cp libavutil/libavutil.a android-libs/armeabi-v7a/
           cp libswresample/libswresample.a android-libs/armeabi-v7a/
           cp libavcodec/libavcodec.a android-libs/armeabi-v7a/
           
             make clean
       
       - name: Debug NDK compilers
         if: steps.cache-aar.outputs.cache-hit != 'true'
         run: |
           echo "Available x86 compilers in NDK:"
           ls -la /opt/android-ndk-r25c/toolchains/llvm/prebuilt/linux-x86_64/bin/*clang* | grep -E "(i686|x86)" || true
       
       - name: Check and patch ExoPlayer build.gradle
         if: steps.cache-aar.outputs.cache-hit != 'true'
         run: |
           BUILD_GRADLE="/tmp/media3/libraries/decoder_ffmpeg/build.gradle"
           echo "=== Build.gradle content ==="
           cat "$BUILD_GRADLE"
           echo "=== End ==="
           
            cat > /tmp/patch_gradle.py << 'EOF'
            import re
            
            build_gradle = "/tmp/media3/libraries/decoder_ffmpeg/build.gradle"
            
            with open(build_gradle, 'r') as f:
                content = f.read()
            
            print("Original content:")
            print(content)
            print("=" * 50)
            
            # Check if already has abiFilters
            if 'abiFilters' in content:
                print("Found existing abiFilters, replacing...")
                content = re.sub(
                    r"abiFilters\s*=\s*\[[^\]]*\]",
                    'abiFilters = ["arm64-v8a", "armeabi-v7a"]',
                    content
                )
            else:
                print("No existing abiFilters found, appending...")
                # decoder_ffmpeg/build.gradle doesn't have defaultConfig,
                # it inherits from common_library_config.gradle
                content = content.rstrip() + '\n\n// Limit ABIs to only ARM architectures\nandroid.defaultConfig.ndk.abiFilters = ["arm64-v8a", "armeabi-v7a"]\n'
            
            with open(build_gradle, 'w') as f:
                f.write(content)
            
            print("Patched content:")
            with open(build_gradle, 'r') as f:
                print(f.read())
            EOF
            
            python3 /tmp/patch_gradle.py
       
       - name: Build AAR
         if: steps.cache-aar.outputs.cache-hit != 'true'
         run: |
           cd /tmp/media3
           ./gradlew :lib-decoder-ffmpeg:assembleRelease
      
      - name: Copy AAR to project
        if: steps.cache-aar.outputs.cache-hit != 'true'
        run: |
          mkdir -p android/exoplayer-ffmpeg/libs
          cp /tmp/media3/libraries/decoder_ffmpeg/build/outputs/aar/decoder_ffmpeg-release.aar \
             android/exoplayer-ffmpeg/libs/ffmpeg-extension.aar
          echo "AAR file prepared:"
          ls -la android/exoplayer-ffmpeg/libs/
      
      # 保存到缓存（供后续 workflow 使用）
      - name: Save AAR to cache
        if: steps.cache-aar.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: android/exoplayer-ffmpeg/libs/ffmpeg-extension.aar
          key: ffmpeg-aar-${{ env.EXOPLAYER_VERSION }}-${{ env.FFMPEG_VERSION }}-${{ hashFiles('android/exoplayer-ffmpeg/**') }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-ffmpeg
    if: always() && (needs.build-ffmpeg.result == 'success' || needs.build-ffmpeg.result == 'skipped')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true
      
      # 恢复 FFmpeg AAR 缓存
      - name: Restore FFmpeg AAR cache
        if: github.event.inputs.include_ffmpeg != 'false'
        uses: actions/cache@v4
        with:
          path: android/exoplayer-ffmpeg/libs/ffmpeg-extension.aar
          key: ffmpeg-aar-${{ env.EXOPLAYER_VERSION }}-${{ env.FFMPEG_VERSION }}-${{ hashFiles('android/exoplayer-ffmpeg/**') }}
      
      - name: Check FFmpeg AAR
        if: github.event.inputs.include_ffmpeg != 'false'
        run: |
          if [ -f "android/exoplayer-ffmpeg/libs/ffmpeg-extension.aar" ]; then
            echo "✅ FFmpeg extension AAR found"
            ls -la android/exoplayer-ffmpeg/libs/
          else
            echo "⚠️ FFmpeg extension AAR not found, will build without PGS/SUP support"
          fi
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
      
      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        run: flutter build apk --debug
      
      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        run: flutter build apk --release
      
      - name: Upload Debug APK
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
      
      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      
      # 上传构建日志
      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/
          retention-days: 3

  # 注意：iOS 版本将使用原生 Swift 开发，不包含在此 Flutter 构建中
