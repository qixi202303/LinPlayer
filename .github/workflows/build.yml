name: Build Flutter

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.44.2'
  FLUTTER_CHANNEL: 'stable'

jobs:
  prepare:
    name: Prepare build metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            PUBSPEC_VER=$(grep '^version:' pubspec.yaml | head -1 | sed 's/version: *//' | cut -d'+' -f1)
            echo "version=${PUBSPEC_VER}-build${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Analyze code
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  # ============================================================
  # Android 构建
  # ============================================================
  build-android:
    name: Build Android Mobile APK (arm64-v8a)
    runs-on: ubuntu-latest
    needs: [prepare, analyze]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true # jniLibs/*/libmpv.so 由 Git LFS 跟踪，必须拉取真实二进制，否则打进 APK 的是 LFS 指针文件（运行时 UnsatisfiedLinkError: bad ELF magic）

      - name: Verify native libs are real ELF (not LFS pointers)
        run: |
          # 防御性校验：若 LFS 未拉取，libmpv.so 会是 "version https://git-lfs..." 文本（magic 0x76657273="vers"），
          # 让构建在此处明确失败，而不是打出运行时崩溃的 APK。
          fail=0
          for so in android/app/src/main/jniLibs/*/libmpv.so; do
            magic=$(head -c 4 "$so" | xxd -p)
            if [ "$magic" != "7f454c46" ]; then
              echo "::error::$so 不是 ELF 二进制（magic=$magic），LFS 对象未拉取。检查 actions/checkout 的 lfs: true。"
              fail=1
            else
              echo "OK: $so ($(stat -c %s "$so") bytes, ELF)"
            fi
          done
          [ "$fail" = 0 ]

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Fix plugin namespaces for AGP 8
        run: |
          # brightness_volume 1.0.3 doesn't have namespace (required by AGP 8.x)
          PLUGIN_DIR="/home/runner/.pub-cache/hosted/pub.dev/brightness_volume-1.0.3/android"
          if [ -f "$PLUGIN_DIR/build.gradle" ] && ! grep -q "namespace" "$PLUGIN_DIR/build.gradle"; then
            if [ -f "$PLUGIN_DIR/src/main/AndroidManifest.xml" ]; then
              PACKAGE=$(grep -o 'package="[^"]*"' "$PLUGIN_DIR/src/main/AndroidManifest.xml" | head -1 | cut -d'"' -f2)
              if [ -n "$PACKAGE" ]; then
                echo "Adding namespace '$PACKAGE' to brightness_volume"
                sed -i "/^android {/a\\    namespace '$PACKAGE'" "$PLUGIN_DIR/build.gradle"
                echo "Patched build.gradle:"
                cat "$PLUGIN_DIR/build.gradle"
              fi
            fi
          fi

      - name: Fix plugin compileSdk for androidx
        run: |
          # Many Flutter plugins use low compileSdk, but androidx dependencies require 36+
          for dir in /home/runner/.pub-cache/hosted/pub.dev/*/android; do
            if [ -f "$dir/build.gradle" ]; then
              sed -i -E "s/compileSdkVersion [0-9]+/compileSdkVersion 36/g" "$dir/build.gradle"
              sed -i -E "s/compileSdk = [0-9]+/compileSdk = 36/g" "$dir/build.gradle"
              if [ -f "$dir/build.gradle.kts" ]; then
                sed -i -E "s/compileSdkVersion = [0-9]+/compileSdkVersion = 36/g" "$dir/build.gradle.kts"
                sed -i -E "s/compileSdk = [0-9]+/compileSdk = 36/g" "$dir/build.gradle.kts"
              fi
            fi
            if [ -f "$dir/build.gradle.kts" ]; then
              sed -i -E "s/compileSdkVersion = [0-9]+/compileSdkVersion = 36/g" "$dir/build.gradle.kts"
              sed -i -E "s/compileSdk = [0-9]+/compileSdk = 36/g" "$dir/build.gradle.kts"
            fi
          done

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "已解码发布签名 keystore（用于覆盖更新签名）"
          else
            echo "::warning::未配置 ANDROID_KEYSTORE_BASE64，APK 将用 debug 签名，无法覆盖更新"
          fi

      - name: Build Android Mobile Release APK (arm64-v8a)
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
          ORG_GRADLE_PROJECT_linplayerTargetAbis: arm64-v8a
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" 2>/dev/null || true

          CLEAN_ID=$(printf '%s' "$DANDANPLAY_APP_ID" | tr -d '\r' | paste -sd ',' -)
          CLEAN_SECRET=$(printf '%s' "$DANDANPLAY_APP_SECRET" | tr -d '\r' | paste -sd ',' -)
          VERSION="${{ needs.prepare.outputs.version }}"

          # --build-number 让 versionCode 随 CI run 递增，系统才认作「升级」。
          flutter build apk --release --split-per-abi \
            --flavor mobile \
            --target-platform android-arm64 \
            --build-number="${{ github.run_number }}" \
            --dart-define=APP_VERSION="$VERSION" \
            --dart-define=DANDANPLAY_APP_ID="$CLEAN_ID" \
            --dart-define=DANDANPLAY_APP_SECRET="$CLEAN_SECRET"

          APK_DIR="build/app/outputs/flutter-apk"
          ARM64_SOURCE=$(find "$APK_DIR" -maxdepth 1 -type f -name '*arm64-v8a*release.apk' | head -n 1)
          ARM64_TARGET="$APK_DIR/LinPlayer-Android-Mobile-v$VERSION-arm64-v8a.apk"

          if [ -z "$ARM64_SOURCE" ] || [ ! -f "$ARM64_SOURCE" ]; then
            echo "Expected mobile arm64 APK not found in $APK_DIR"
            ls -lah "$APK_DIR" || true
            exit 1
          fi

          cp "$ARM64_SOURCE" "$ARM64_TARGET"
          APK_ABIS=$(unzip -Z1 "$ARM64_TARGET" | grep '^lib/' | cut -d/ -f2 | sort -u)
          echo "Android Mobile APK ABIs:"
          printf '%s\n' "$APK_ABIS"
          if ! printf '%s\n' "$APK_ABIS" | grep -qx 'arm64-v8a'; then
            echo "arm64-v8a ABI missing from mobile APK"
            exit 1
          fi
          UNEXPECTED_ABIS=$(printf '%s\n' "$APK_ABIS" | grep -v '^arm64-v8a$' || true)
          if [ -n "$UNEXPECTED_ABIS" ]; then
            echo "Unexpected ABI entries found in mobile APK:"
            printf '%s\n' "$UNEXPECTED_ABIS"
            exit 1
          fi
          ls -lh "$ARM64_TARGET"

      - name: Upload Android Mobile APK
        uses: actions/upload-artifact@v4
        with:
          name: release-android-mobile-arm64-v8a
          path: build/app/outputs/flutter-apk/LinPlayer-Android-Mobile-v*.apk
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-android
          path: build/
          retention-days: 3

  # ============================================================
  # Android TV 构建
  # ============================================================
  build-android-tv:
    name: Build Android TV APK (armeabi-v7a)
    runs-on: ubuntu-latest
    needs: [prepare, analyze]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true # jniLibs/*/libmpv.so 由 Git LFS 跟踪，必须拉取真实二进制，否则打进 APK 的是 LFS 指针文件（运行时 UnsatisfiedLinkError: bad ELF magic）

      - name: Verify native libs are real ELF (not LFS pointers)
        run: |
          # 防御性校验：若 LFS 未拉取，libmpv.so 会是 "version https://git-lfs..." 文本（magic 0x76657273="vers"），
          # 让构建在此处明确失败，而不是打出运行时崩溃的 APK。
          fail=0
          for so in android/app/src/main/jniLibs/*/libmpv.so; do
            magic=$(head -c 4 "$so" | xxd -p)
            if [ "$magic" != "7f454c46" ]; then
              echo "::error::$so 不是 ELF 二进制（magic=$magic），LFS 对象未拉取。检查 actions/checkout 的 lfs: true。"
              fail=1
            else
              echo "OK: $so ($(stat -c %s "$so") bytes, ELF)"
            fi
          done
          [ "$fail" = 0 ]

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Fix plugin namespaces for AGP 8
        run: |
          # brightness_volume 1.0.3 doesn't have namespace (required by AGP 8.x)
          PLUGIN_DIR="/home/runner/.pub-cache/hosted/pub.dev/brightness_volume-1.0.3/android"
          if [ -f "$PLUGIN_DIR/build.gradle" ] && ! grep -q "namespace" "$PLUGIN_DIR/build.gradle"; then
            if [ -f "$PLUGIN_DIR/src/main/AndroidManifest.xml" ]; then
              PACKAGE=$(grep -o 'package="[^"]*"' "$PLUGIN_DIR/src/main/AndroidManifest.xml" | head -1 | cut -d'"' -f2)
              if [ -n "$PACKAGE" ]; then
                echo "Adding namespace '$PACKAGE' to brightness_volume"
                sed -i "/^android {/a\\    namespace '$PACKAGE'" "$PLUGIN_DIR/build.gradle"
                echo "Patched build.gradle:"
                cat "$PLUGIN_DIR/build.gradle"
              fi
            fi
          fi

      - name: Fix plugin compileSdk for androidx
        run: |
          # Many Flutter plugins use low compileSdk, but androidx dependencies require 36+
          for dir in /home/runner/.pub-cache/hosted/pub.dev/*/android; do
            if [ -f "$dir/build.gradle" ]; then
              sed -i -E "s/compileSdkVersion [0-9]+/compileSdkVersion 36/g" "$dir/build.gradle"
              sed -i -E "s/compileSdk = [0-9]+/compileSdk = 36/g" "$dir/build.gradle"
              if [ -f "$dir/build.gradle.kts" ]; then
                sed -i -E "s/compileSdkVersion = [0-9]+/compileSdkVersion = 36/g" "$dir/build.gradle.kts"
                sed -i -E "s/compileSdk = [0-9]+/compileSdk = 36/g" "$dir/build.gradle.kts"
              fi
            fi
            if [ -f "$dir/build.gradle.kts" ]; then
              sed -i -E "s/compileSdkVersion = [0-9]+/compileSdkVersion = 36/g" "$dir/build.gradle.kts"
              sed -i -E "s/compileSdk = [0-9]+/compileSdk = 36/g" "$dir/build.gradle.kts"
            fi
          done

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "已解码发布签名 keystore（用于覆盖更新签名）"
          else
            echo "::warning::未配置 ANDROID_KEYSTORE_BASE64，APK 将用 debug 签名，无法覆盖更新"
          fi

      - name: Build Android TV Release APK (armeabi-v7a)
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
          ORG_GRADLE_PROJECT_linplayerTargetAbis: armeabi-v7a
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-36" 2>/dev/null || true

          CLEAN_ID=$(printf '%s' "$DANDANPLAY_APP_ID" | tr -d '\r' | paste -sd ',' -)
          CLEAN_SECRET=$(printf '%s' "$DANDANPLAY_APP_SECRET" | tr -d '\r' | paste -sd ',' -)
          VERSION="${{ needs.prepare.outputs.version }}"

          # Android TV release only needs the 32-bit build.
          # --build-number 让 versionCode 随 CI run 递增，系统才认作「升级」。
          flutter build apk --release --split-per-abi \
            --flavor tv \
            --target-platform android-arm \
            --build-number="${{ github.run_number }}" \
            --dart-define=FLAVOR=tv \
            --dart-define=APP_VERSION="$VERSION" \
            --dart-define=DANDANPLAY_APP_ID="$CLEAN_ID" \
            --dart-define=DANDANPLAY_APP_SECRET="$CLEAN_SECRET"

          TV_APK_DIR="build/app/outputs/flutter-apk"
          TV_APK_SOURCE=$(find "$TV_APK_DIR" -maxdepth 1 -type f -name '*armeabi-v7a*release.apk' | head -n 1)
          TV_APK_TARGET="$TV_APK_DIR/LinPlayer-Android-TV-v$VERSION-armeabi-v7a.apk"

          if [ -z "$TV_APK_SOURCE" ] || [ ! -f "$TV_APK_SOURCE" ]; then
            echo "Expected TV APK not found in $TV_APK_DIR"
            ls -lah "$TV_APK_DIR" || true
            exit 1
          fi

          cp "$TV_APK_SOURCE" "$TV_APK_TARGET"
          APK_ABIS=$(unzip -Z1 "$TV_APK_TARGET" | grep '^lib/' | cut -d/ -f2 | sort -u)
          echo "Android TV APK ABIs:"
          printf '%s\n' "$APK_ABIS"
          if ! printf '%s\n' "$APK_ABIS" | grep -qx 'armeabi-v7a'; then
            echo "armeabi-v7a ABI missing from Android TV APK"
            exit 1
          fi
          UNEXPECTED_ABIS=$(printf '%s\n' "$APK_ABIS" | grep -v '^armeabi-v7a$' || true)
          if [ -n "$UNEXPECTED_ABIS" ]; then
            echo "Unexpected ABI entries found in Android TV APK:"
            printf '%s\n' "$UNEXPECTED_ABIS"
            exit 1
          fi
          ls -lh "$TV_APK_TARGET"

      - name: Upload Android TV APK
        uses: actions/upload-artifact@v4
        with:
          name: release-android-tv-armeabi-v7a
          path: build/app/outputs/flutter-apk/LinPlayer-Android-TV-v*.apk
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-android-tv
          path: build/
          retention-days: 3

  # ============================================================
  # iOS Mobile 构建
  # ============================================================
  build-ios:
    name: Build iOS Mobile
    runs-on: macos-latest
    needs: [prepare, analyze]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Enable iOS
        run: flutter config --enable-ios

      - name: Build iOS Release (unsigned)
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: |
          CLEAN_ID=$(printf '%s' "$DANDANPLAY_APP_ID" | tr -d '\r' | paste -sd ',' -)
          CLEAN_SECRET=$(printf '%s' "$DANDANPLAY_APP_SECRET" | tr -d '\r' | paste -sd ',' -)

          flutter build ios --release --no-codesign \
            --dart-define=APP_VERSION="${{ needs.prepare.outputs.version }}" \
            --dart-define=DANDANPLAY_APP_ID="$CLEAN_ID" \
            --dart-define=DANDANPLAY_APP_SECRET="$CLEAN_SECRET"

      - name: Package iOS IPA (unsigned)
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          APP_PATH=$(find build/ios/iphoneos -maxdepth 1 -type d -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No iOS app bundle found in build output"
            ls -la build/ios/iphoneos || true
            exit 1
          fi

          OUTPUT_NAME="LinPlayer-iOS-v$VERSION-unsigned"
          # iOS 安装包是 IPA：本质是含 Payload/ 目录的 zip（Payload/Runner.app）。
          # 未签名，需自行用证书重签后再安装/侧载。
          rm -rf Payload "$OUTPUT_NAME.ipa"
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          # -y 保留 .app 内部可能存在的符号链接，确保 bundle 结构完整
          zip -qry "$OUTPUT_NAME.ipa" Payload
          rm -rf Payload

          echo "Created: $OUTPUT_NAME.ipa"
          ls -lh "$OUTPUT_NAME.ipa"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ios
          path: LinPlayer-iOS-*.ipa
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-ios
          path: build/
          retention-days: 3

  # ============================================================
  # Apple TV (tvOS) 构建 — 原生 Swift/SwiftUI，不依赖 Flutter
  # ============================================================
  build-tvos:
    name: Build Apple TV (tvOS)
    runs-on: macos-latest
    needs: [prepare]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # 使用最新可用的 Xcode
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode found"
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH"
          echo "Using Xcode: $(xcodebuild -version)"

      - name: Resolve Swift packages
        run: |
          cd apple_tv
          xcodebuild -resolvePackageDependencies \
            -project LinPlayerTV.xcodeproj \
            -scheme LinPlayerTV \
            -clonedSourcePackagesDirPath ../build/tvos-spm \
            2>&1 || true

      - name: Build tvOS Release (unsigned)
        run: |
          cd apple_tv
          xcodebuild build \
            -project LinPlayerTV.xcodeproj \
            -scheme LinPlayerTV \
            -sdk appletvos \
            -configuration Release \
            -derivedDataPath ../build/tvos \
            -clonedSourcePackagesDirPath ../build/tvos-spm \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Package tvOS IPA (unsigned)
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          APP_PATH=$(find build/tvos/Build/Products/Release-appletvos -maxdepth 1 -type d -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No tvOS app bundle found in build output"
            ls -laR build/tvos/Build/Products/ || true
            exit 1
          fi

          INFO_PLIST="$APP_PATH/Info.plist"
          if [ ! -f "$INFO_PLIST" ]; then
            echo "tvOS app bundle is missing Info.plist"
            find "$APP_PATH" -maxdepth 2 -type f | sort || true
            exit 1
          fi

          EXECUTABLE_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$INFO_PLIST")
          EXECUTABLE_PATH="$APP_PATH/$EXECUTABLE_NAME"
          if [ ! -f "$EXECUTABLE_PATH" ]; then
            echo "tvOS app bundle is missing executable: $EXECUTABLE_NAME"
            find "$APP_PATH" -maxdepth 2 -type f | sort || true
            exit 1
          fi

          echo "tvOS bundle size:"
          du -sh "$APP_PATH"
          echo "tvOS executable size:"
          ls -lh "$EXECUTABLE_PATH"

          OUTPUT_NAME="LinPlayer-AppleTV-v$VERSION-unsigned"
          # tvOS 安装包与 iOS 一致：IPA = 含 Payload/ 的 zip（Payload/xxx.app）。
          # 未签名，需用证书重签后经 TestFlight / Apple Configurator 安装。
          rm -rf Payload "$OUTPUT_NAME.ipa"
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          # -y 保留 .app 内部可能存在的符号链接，确保 bundle 结构完整
          zip -qry "$OUTPUT_NAME.ipa" Payload
          rm -rf Payload

          echo "Created: $OUTPUT_NAME.ipa"
          ls -lh "$OUTPUT_NAME.ipa"

      - name: Upload tvOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apple-tv
          path: LinPlayer-AppleTV-*.ipa
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-tvos
          path: build/tvos/
          retention-days: 3

  # ============================================================
  # Windows 桌面端构建
  # ============================================================
  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    needs: [prepare, analyze]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows Release
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
          LINPLAYER_SKIP_LIBMPV_UPGRADE: 1
        shell: pwsh
        run: |
          $cleanId = (("$env:DANDANPLAY_APP_ID" -split "[`r`n]+") | Where-Object { $_.Trim() -ne "" } | ForEach-Object { $_.Trim() }) -join ","
          $cleanSecret = (("$env:DANDANPLAY_APP_SECRET" -split "[`r`n]+") | Where-Object { $_.Trim() -ne "" } | ForEach-Object { $_.Trim() }) -join ","

          flutter build windows --release `
            --dart-define=APP_VERSION="${{ needs.prepare.outputs.version }}" `
            --dart-define=DANDANPLAY_APP_ID="$cleanId" `
            --dart-define=DANDANPLAY_APP_SECRET="$cleanSecret"

      - name: Upgrade libmpv-2.dll for PGS/SUP
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $outputDir = "build/windows/x64/runner/Release"
          $target = Join-Path $outputDir "libmpv-2.dll"
          $orig = Join-Path $outputDir "libmpv-2.dll.orig"
          $used = $false

          # 优先消费 libmpv-latest 预构建产物；失败则回退脚本现下。
          try {
            $tmp = Join-Path $env:RUNNER_TEMP "libmpv-pre"
            New-Item -ItemType Directory -Force -Path $tmp | Out-Null
            gh release download "libmpv-latest" --repo "${{ github.repository }}" `
              --pattern "libmpv-2.dll" --dir $tmp --clobber
            $pre = Join-Path $tmp "libmpv-2.dll"
            if ((Test-Path $pre) -and ((Get-Item $pre).Length -gt 60MB)) {
              Copy-Item $target $orig -Force
              Copy-Item $pre $target -Force
              Write-Host "已使用 libmpv-latest 预构建的完整版 libmpv-2.dll"
              $used = $true
            }
          } catch {
            Write-Host "未取到 libmpv-latest 预构建，回退脚本下载: $_"
          }

          if (-not $used) {
            & "$env:GITHUB_WORKSPACE/windows/scripts/upgrade_libmpv_for_pgs.ps1" -BuildOutput $outputDir
          }

          if (-not (Test-Path -LiteralPath $orig)) {
            throw "libmpv-2.dll 未成功替换，PGS/SUP 可能无法显示"
          }
          $targetInfo = Get-Item -LiteralPath $target
          $origInfo = Get-Item -LiteralPath $orig
          if ($targetInfo.Length -le $origInfo.Length) {
            throw "libmpv-2.dll 替换后大小未增长，可能仍缺少 PGS 解码器"
          }
          Write-Host "libmpv-2.dll 完整版就绪，大小: $($targetInfo.Length) bytes"

      - name: Bundle ffmpeg (内置，避免运行时无校验下载，M6)
        shell: pwsh
        run: |
          $outputDir = "build/windows/x64/runner/Release"
          try {
            $tmp = Join-Path $env:RUNNER_TEMP "ffmpeg-win"
            New-Item -ItemType Directory -Force -Path $tmp | Out-Null
            $zip = Join-Path $tmp "ffmpeg.zip"
            Invoke-WebRequest -UseBasicParsing -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile $zip
            Expand-Archive -Path $zip -DestinationPath $tmp -Force
            $exe = Get-ChildItem -Path $tmp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
            if ($exe) {
              Copy-Item $exe.FullName (Join-Path $outputDir "ffmpeg.exe") -Force
              Write-Host "Bundled ffmpeg.exe ($($exe.Length) bytes)"
            } else {
              Write-Host "::warning::ffmpeg.exe 未在归档中找到，跳过内置"
            }
          } catch {
            Write-Host "::warning::内置 ffmpeg 失败（不阻断构建）: $_"
          }

      - name: Package Windows Build
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          $sourceDir = "build\windows\x64\runner\Release"
          $outputName = "LinPlayer-Windows-v$version"

          Compress-Archive -Path "$sourceDir\*" -DestinationPath "$outputName.zip" -Force

          Write-Host "Package contents:"
          Get-ChildItem "$sourceDir"

          Write-Host "Created: $outputName.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: LinPlayer-Windows-*.zip
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-windows
          path: build/
          retention-days: 3

  # ============================================================
  # Linux 桌面端构建
  # ============================================================
  build-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest
    needs: [prepare, analyze]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          # media_kit_video links libmpv via pkg-config on Linux.
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev libepoxy-dev

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux Release
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: |
          CLEAN_ID=$(printf '%s' "$DANDANPLAY_APP_ID" | tr -d '\r' | paste -sd ',' -)
          CLEAN_SECRET=$(printf '%s' "$DANDANPLAY_APP_SECRET" | tr -d '\r' | paste -sd ',' -)

          flutter build linux --release \
            --dart-define=APP_VERSION="${{ needs.prepare.outputs.version }}" \
            --dart-define=DANDANPLAY_APP_ID="$CLEAN_ID" \
            --dart-define=DANDANPLAY_APP_SECRET="$CLEAN_SECRET"

      - name: Bundle ffmpeg (内置，避免运行时无校验下载，M6)
        run: |
          OUT="build/linux/x64/release/bundle"
          set +e
          curl -fsSL -o /tmp/ffmpeg.tar.xz "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz" \
            && mkdir -p /tmp/ffmpeg && tar -xf /tmp/ffmpeg.tar.xz -C /tmp/ffmpeg \
            && FF=$(find /tmp/ffmpeg -type f -name ffmpeg | head -n1) \
            && cp "$FF" "$OUT/ffmpeg" && chmod +x "$OUT/ffmpeg" \
            && echo "Bundled ffmpeg: $(ls -la "$OUT/ffmpeg")"
          if [ ! -f "$OUT/ffmpeg" ]; then echo "::warning::内置 ffmpeg 失败（不阻断构建）"; fi
          set -e

      - name: Package Linux Build
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          SOURCE_DIR="build/linux/x64/release/bundle"
          OUTPUT_DIR="LinPlayer-Linux-v$VERSION"

          test -d "$SOURCE_DIR"
          mkdir -p "$OUTPUT_DIR"
          cp -R "$SOURCE_DIR"/. "$OUTPUT_DIR"/
          tar -czf "$OUTPUT_DIR.tar.gz" "$OUTPUT_DIR"

          echo "Created: $OUTPUT_DIR.tar.gz"
          ls -la "$OUTPUT_DIR"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: LinPlayer-Linux-*.tar.gz
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-linux
          path: build/
          retention-days: 3

  # ============================================================
  # macOS 桌面端构建
  # ============================================================
  build-macos:
    name: Build macOS Desktop
    runs-on: macos-latest
    needs: [prepare, analyze]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS Release
        env:
          DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
          DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}
        run: |
          CLEAN_ID=$(printf '%s' "$DANDANPLAY_APP_ID" | tr -d '\r' | paste -sd ',' -)
          CLEAN_SECRET=$(printf '%s' "$DANDANPLAY_APP_SECRET" | tr -d '\r' | paste -sd ',' -)

          flutter build macos --release \
            --dart-define=APP_VERSION="${{ needs.prepare.outputs.version }}" \
            --dart-define=DANDANPLAY_APP_ID="$CLEAN_ID" \
            --dart-define=DANDANPLAY_APP_SECRET="$CLEAN_SECRET"

      - name: Bundle ffmpeg (内置，避免运行时无校验下载，M6)
        run: |
          APP_PATH=$(find build/macos/Build/Products/Release -maxdepth 1 -type d -name "*.app" | head -n 1)
          MACOS_DIR="$APP_PATH/Contents/MacOS"
          set +e
          curl -fsSL -o /tmp/ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" \
            && mkdir -p /tmp/ffmpeg && unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg \
            && FF=$(find /tmp/ffmpeg -type f -name ffmpeg | head -n1) \
            && cp "$FF" "$MACOS_DIR/ffmpeg" && chmod +x "$MACOS_DIR/ffmpeg" \
            && echo "Bundled ffmpeg into app bundle: $(ls -la "$MACOS_DIR/ffmpeg")"
          if [ ! -f "$MACOS_DIR/ffmpeg" ]; then echo "::warning::内置 ffmpeg 失败（不阻断构建）"; fi
          set -e

      - name: Package macOS Build
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          APP_PATH=$(find build/macos/Build/Products/Release -maxdepth 1 -type d -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No macOS app bundle found in build output"
            exit 1
          fi

          OUTPUT_NAME="LinPlayer-macOS-v$VERSION"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$OUTPUT_NAME.zip"

          echo "Created: $OUTPUT_NAME.zip"
          ls -la build/macos/Build/Products/Release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: LinPlayer-macOS-*.zip
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-macos
          path: build/
          retention-days: 3

  # ============================================================
  # 创建预发布版本（聚合所有平台产物）
  # ============================================================
  create-prerelease:
    name: Create Pre-release
    needs: [prepare, build-android, build-android-tv, build-ios, build-tvos, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: ./artifacts/
          merge-multiple: true

      - name: List release artifacts
        run: ls -lah ./artifacts/

      - name: Generate SHA256 checksums
        run: |
          # 为所有产物生成汇总校验文件，随发布上传，供 App 端校验安装包完整性。
          cd ./artifacts
          rm -f SHA256SUMS
          for f in *; do [ -f "$f" ] && sha256sum "$f"; done > SHA256SUMS
          echo "Generated SHA256SUMS:"; cat SHA256SUMS

      - name: Create Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}-pre
          name: v${{ needs.prepare.outputs.version }} (Pre-release)
          prerelease: true
          files: ./artifacts/*
          generate_release_notes: true
