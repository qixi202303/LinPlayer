name: Extract libmpv from mpv-android

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

env:
  MPV_ANDROID_REPO: mpv-android/mpv-android

jobs:
  extract-libmpv:
    name: Extract libmpv (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86, x86_64]
    
    steps:
      - name: Checkout LinPlayer
        uses: actions/checkout@v4
      
      - name: Get latest mpv-android release
        id: get_release
        run: |
          RELEASE_INFO=$(curl -s "https://api.github.com/repos/${{ env.MPV_ANDROID_REPO }}/releases/latest")
          
          # 使用按 ABI 分发的 APK（更可靠，避免 universal APK 的压缩问题）
          ABI="${{ matrix.abi }}"
          APK_URL=$(echo "$RELEASE_INFO" | grep -o '"browser_download_url": "[^"]*app-default-'"$ABI"'-release\.apk"' | head -1 | cut -d'"' -f4)
          
          if [ -z "$APK_URL" ]; then
            echo "❌ No APK found for ABI: $ABI"
            exit 1
          fi
          
          echo "📥 Found APK for $ABI: $APK_URL"
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
      
      - name: Download and verify APK
        run: |
          APK_URL="${{ steps.get_release.outputs.apk_url }}"
          ABI="${{ matrix.abi }}"
          
          echo "Downloading APK for $ABI..."
          wget -q --show-progress "$APK_URL" -O "mpv-android-$ABI.apk"
          
          # 验证 APK 大小（按 ABI 的 APK 应该约 20-25MB）
          APK_SIZE=$(stat -c%s "mpv-android-$ABI.apk")
          echo "APK size: $APK_SIZE bytes"
          
          if [ "$APK_SIZE" -lt 10000000 ]; then
            echo "❌ APK too small ($APK_SIZE bytes), may be corrupted"
            exit 1
          fi
          
          # 解压 APK
          mkdir -p "apk_extracted_$ABI"
          unzip -q "mpv-android-$ABI.apk" -d "apk_extracted_$ABI/"
          echo "✅ APK extracted"
      
      - name: Extract libmpv.so
        run: |
          ABI="${{ matrix.abi }}"
          SOURCE_DIR="apk_extracted_$ABI/lib/$ABI"
          DEST_DIR="android/app/src/main/jniLibs/$ABI"
          
          mkdir -p "$DEST_DIR"
          
          if [ -f "$SOURCE_DIR/libmpv.so" ]; then
            cp "$SOURCE_DIR/libmpv.so" "$DEST_DIR/"
            echo "✅ Extracted libmpv.so for $ABI"
          else
            echo "❌ libmpv.so not found for $ABI"
            find "apk_extracted_$ABI" -name "*.so" | head -20
            exit 1
          fi
      
      - name: Verify library integrity
        run: |
          ABI="${{ matrix.abi }}"
          LIBMPV="android/app/src/main/jniLibs/$ABI/libmpv.so"
          
          # 检查文件大小（完整的 libmpv.so 应该 > 10MB）
          FILE_SIZE=$(stat -c%s "$LIBMPV")
          echo "libmpv.so size: $FILE_SIZE bytes"
          
          if [ "$FILE_SIZE" -lt 10000000 ]; then
            echo "❌ libmpv.so too small ($FILE_SIZE bytes), may be incomplete"
            exit 1
          fi
          
          # 验证 ELF 格式
          if command -v file >/dev/null 2>&1; then
            file "$LIBMPV"
          fi
          
          # 检查 PGS 解码器
          if strings "$LIBMPV" | grep -q "pgssub"; then
            echo "✅ PGS decoder found"
          else
            echo "⚠️ PGS decoder not found"
          fi
          
          # 检查 libass
          if strings "$LIBMPV" | grep -q "libass"; then
            echo "✅ libass found"
          fi
          
          ls -lh "$LIBMPV"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmpv-extracted-${{ matrix.abi }}
          path: android/app/src/main/jniLibs/${{ matrix.abi }}/
          retention-days: 90

  commit-libraries:
    name: Commit extracted libraries
    needs: extract-libmpv
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LinPlayer
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: extracted-libs
          pattern: libmpv-extracted-*
      
      - name: Copy to jniLibs
        run: |
          mkdir -p android/app/src/main/jniLibs
          
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            if [ -d "extracted-libs/libmpv-extracted-$abi" ]; then
              mkdir -p "android/app/src/main/jniLibs/$abi"
              cp extracted-libs/libmpv-extracted-$abi/*.so "android/app/src/main/jniLibs/$abi/"
              echo "✅ Copied libraries for $abi"
            fi
          done
          
          echo "=== Final jniLibs contents ==="
          find android/app/src/main/jniLibs -name "*.so" -exec ls -lh {} \;
      
      - name: Verify before commit
        run: |
          echo "=== Verifying all libraries ==="
          for abi in arm64-v8a armeabi-v7a x86 x86_64; do
            LIB="android/app/src/main/jniLibs/$abi/libmpv.so"
            if [ -f "$LIB" ]; then
              SIZE=$(stat -c%s "$LIB")
              echo "$ABI: $SIZE bytes"
              if [ "$SIZE" -lt 10000000 ]; then
                echo "❌ Library too small!"
                exit 1
              fi
            fi
          done
          echo "✅ All libraries verified"
      
      - name: Commit libraries
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add android/app/src/main/jniLibs/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update libmpv from mpv-android (per-ABI APKs, includes PGS support)"
            git push
            echo "✅ Libraries committed"
          fi
        continue-on-error: true
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: libmpv-extracted-${{ github.run_number }}
          name: libmpv from mpv-android - Build ${{ github.run_number }}
          body: |
            Extracted libmpv.so from mpv-android release (per-ABI APKs)
            
            Includes:
            - PGS subtitle decoder (pgssub)
            - libass for ASS/SSA subtitles
            - All standard mpv decoders
            
            Source: ${{ env.MPV_ANDROID_REPO }}
          files: android/app/src/main/jniLibs/**/*.so
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true