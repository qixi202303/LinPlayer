name: linplayer_mobile
description: LinPlayer - Emby第三方客户端移动端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # 路由
  go_router: ^14.0.0
  
  # 网络
  dio: ^5.4.0
  
  # 图片加载
  extended_image: ^8.2.0
  
  # 本地存储
  shared_preferences: ^2.2.2
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  
  # 国际化
  slang: ^3.30.0
  slang_flutter: ^3.30.0
  
  # 视频播放 (video_player - ExoPlayer/AVPlayer)
  video_player: ^2.8.2
  # 视频播放 (media_kit - MPV原生)
  media_kit: ^1.1.10+1
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4
  
  # 工具
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  path_provider: ^2.1.2
  path: ^1.9.0
  uuid: ^4.3.3
  
  # UI增强
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  
  # 日志
  talker: ^4.0.0
  talker_dio_logger: ^4.0.0
  
  # 手势
  flutter_volume_controller: ^1.3.1
  brightness_volume: ^1.0.3
  
  # 投屏 (DLNA/mDNS设备发现)
  bonsoir: ^5.1.10
  
  # 后台下载
  flutter_downloader: ^1.11.8
  
  # 图片/文件选择
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  
  # XML解析 (DLNA设备描述)
  xml: ^6.5.0

dependency_overrides:
  # 如有需要

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  slang_build_runner: ^3.30.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/


